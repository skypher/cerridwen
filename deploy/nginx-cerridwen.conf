# Example nginx reverse-proxy config for cerridwen-server.
# Drop this in /etc/nginx/sites-available/, replace `cerridwen.example.com`
# with your hostname, and provide TLS certs via certbot or your own CA.

upstream cerridwen_backend {
    server 127.0.0.1:2828;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name cerridwen.example.com;
    # Redirect plain HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cerridwen.example.com;

    ssl_certificate     /etc/letsencrypt/live/cerridwen.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cerridwen.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Reasonable timeouts. SSE streams want the long read timeout.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE streams: disable response buffering so events arrive in real time.
    location /v1/stream/ {
        proxy_pass http://cerridwen_backend;
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    location / {
        proxy_pass http://cerridwen_backend;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # Health endpoints (no rate limit).
    location = /health {
        proxy_pass http://cerridwen_backend;
        access_log off;
    }
    location = /metrics {
        proxy_pass http://cerridwen_backend;
        access_log off;
        # Optional: restrict to internal scrapers only.
        # allow 10.0.0.0/8;
        # deny all;
    }

    # Aggressive cache for static-ish endpoints (the server returns
    # X-Cache: HIT/MISS, but nginx-side caching is cheap on top).
    location ~* ^/(openapi\.json|favicon\.ico)$ {
        proxy_pass http://cerridwen_backend;
        proxy_cache_valid 200 1h;
    }
}
